name: Automated PR Code Review

# Template workflow for consuming projects.
#
# This workflow checks out the agilefreaks/claude-skills repo alongside your
# project and passes the code-review skill to Claude. The skill provides the
# generic 6-phase methodology; your project's .claude/rules/code-review.md
# provides posting mechanics, context gathering, and project-specific checks.
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — Claude Code OAuth token with code review permissions
#
# Required permissions:
#   pull-requests: write — to post review comments
#   contents: read      — to read repository contents
#   id-token: write     — required by claude-code-action@v1 for OIDC

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout AgileFreaks skills
        uses: actions/checkout@v5
        with:
          repository: agilefreaks/claude-skills
          path: .skills

      - name: Run code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/Agilefreaks/claude-skills.git"
          plugins: "code-review@agilefreaks-skills"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}

            /code-review

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*),Bash(jq:*),Read,Glob,Grep"'
