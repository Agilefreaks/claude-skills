name: Automated PR Code Review

# Template workflow for consuming projects.
#
# Generated by the code-review skill Setup. To regenerate or customise,
# run "set up code-review" in Claude Code or Claude.ai Cowork.
#
# Required secrets:
#   CLAUDE_CODE_OAUTH_TOKEN — Claude Code OAuth token.
#   Generate one with: claude setup-token
#   Then add it to your repo: Settings > Secrets and variables > Actions > New repository secret
#
# Required permissions:
#   pull-requests: write — to post review comments
#   contents: read      — to read repository contents
#   id-token: write     — required by claude-code-action@v1 for OIDC

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run code review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/Agilefreaks/claude-skills.git"
          plugins: "code-review@agilefreaks-skills"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            /code-review

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/sdk#command-line for available options
          claude_args: |
            --model opus
            --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*),Bash(jq:*),Read,Glob,Grep"
